<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MATOTA | Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .sidebar-item.active { background: #10b981; color: white; }
        .loader { border-top-color: #10b981; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r min-h-screen sticky top-0 flex flex-col">
        <div class="p-8 flex items-center gap-2">
            <div class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center text-white"><i class="fa-solid fa-gauge"></i></div>
            <span class="text-xl font-black uppercase">Admin<span class="text-emerald-500">Panel</span></span>
        </div>
        <nav class="flex-grow px-4 space-y-2">
            <button onclick="showTab('posts')" class="sidebar-item active w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition"><i class="fa-solid fa-newspaper"></i> Yazılar</button>
            <button onclick="showTab('files')" class="sidebar-item w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition text-slate-500"><i class="fa-solid fa-file-arrow-up"></i> Dosya & Kategori</button>
            <button onclick="showTab('webhooks')" class="sidebar-item w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition text-slate-500"><i class="fa-solid fa-bolt"></i> Webhook & Ayar</button>
        </nav>
        <div class="p-8"><button onclick="logout()" class="w-full p-3 bg-red-50 text-red-500 rounded-xl font-bold">Çıkış</button></div>
    </aside>

    <!-- Main -->
    <main class="flex-grow p-12 max-w-6xl">
        <!-- Posts Tab -->
        <div id="tab-posts" class="tab-view space-y-8">
            <div class="flex justify-between items-end">
                <h1 class="text-4xl font-black">İçerik Yönetimi</h1>
                <button onclick="openAIModal()" class="bg-emerald-50 text-emerald-600 px-6 py-2 rounded-2xl font-black uppercase tracking-tighter border border-emerald-200">AI İle Mükemmel Yazı Üret</button>
            </div>
            <div class="bg-white rounded-[2.5rem] p-10 border shadow-sm space-y-6">
                <h3 id="post-form-title" class="text-xl font-bold">Yeni Yazı Yayınla</h3>
                <form id="post-form" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="p-title" placeholder="Yazı Başlığı" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                    <textarea id="p-content" rows="12" placeholder="İçerik..." required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
                    <div class="flex gap-4">
                        <button type="submit" class="flex-grow bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-lg">Yayınla</button>
                        <button type="button" id="btn-cancel-edit" class="hidden px-8 bg-slate-100 rounded-2xl font-bold" onclick="resetPostForm()">Vazgeç</button>
                    </div>
                </form>
            </div>
            <div class="bg-white rounded-[2.5rem] border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b"><tr class="text-xs font-black uppercase text-slate-400"><th class="p-6">Başlık</th><th class="p-6">Etkileşim</th><th class="p-6 text-right">İşlem</th></tr></thead>
                    <tbody id="posts-table" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <!-- Files Tab -->
        <div id="tab-files" class="tab-view hidden space-y-8">
            <h1 class="text-4xl font-black">Dosya & Kategori</h1>
            <div class="grid grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-[2.5rem] border space-y-6">
                    <h3 class="font-bold">Yeni Kategori / Alt Kategori</h3>
                    <form id="cat-form" class="space-y-4">
                        <input type="text" id="cat-name" placeholder="Kategori Adı" required class="w-full p-4 border rounded-2xl">
                        <select id="cat-parent" class="w-full p-4 border rounded-2xl bg-white"><option value="">Ana Kategori</option></select>
                        <button type="submit" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold">Kategori Ekle</button>
                    </form>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] border space-y-6">
                    <h3 class="font-bold">Bucket'a Dosya Yükle</h3>
                    <form id="file-upload-form" class="space-y-4">
                        <input type="file" id="file-input" required class="w-full p-4 border border-dashed rounded-2xl">
                        <select id="file-cat-select" required class="w-full p-4 border rounded-2xl bg-white"></select>
                        <button type="submit" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold shadow-md">Seçili Dosyayı Yükle</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Webhook Tab -->
        <div id="tab-webhooks" class="tab-view hidden space-y-8">
            <h1 class="text-4xl font-black">Ayarlar & Webhook</h1>
            <div class="bg-white p-10 rounded-[2.5rem] border max-w-2xl space-y-8">
                <div class="space-y-4">
                    <label class="font-bold text-slate-500 uppercase text-xs">Gemini API Key</label>
                    <input type="password" id="gemini-key" class="w-full p-4 border rounded-2xl outline-none">
                </div>
                <div class="space-y-4">
                    <label class="font-bold text-slate-500 uppercase text-xs">Admin Webhook URL (Yorum Bildirimi)</label>
                    <input type="url" id="webhook-url" placeholder="https://hook.eu.make.com/..." class="w-full p-4 border rounded-2xl outline-none">
                </div>
                <button onclick="saveAllSettings()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">Ayarları Güncelle</button>
            </div>
        </div>
    </main>

    <!-- AI Modal -->
    <div id="ai-modal" class="hidden fixed inset-0 z-[2000] bg-black/40 backdrop-blur-md flex items-center justify-center p-6">
        <div class="max-w-lg w-full bg-white p-10 rounded-[3rem] shadow-2xl space-y-6">
            <h2 class="text-3xl font-black">AI Mükemmel Yazıcı</h2>
            <input type="text" id="ai-topic" placeholder="Konu: Örn. LGS Üslü Sayılar Taktikleri" class="w-full p-4 border rounded-2xl outline-none font-bold">
            <div id="ai-loading" class="hidden text-center py-4 text-emerald-600 font-bold"><div class="loader mx-auto mb-2 border-4 rounded-full h-10 w-10"></div>Efsane bir yazı hazırlanıyor...</div>
            <div class="flex gap-4">
                <button onclick="closeAIModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold">Vazgeç</button>
                <button id="ai-gen-btn" onclick="generateExcellentPost()" class="flex-1 p-4 bg-emerald-600 text-white rounded-2xl font-bold">Yazıyı Üret</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://eygvzptaynyysagvgwyh.supabase.co'; 
        const SB_KEY = 'sb_publishable_JixS3C4jQ2Znrgcr3-IZPg_1MfpvdXW';
        const sc = window.supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const { data: { session } } = await sc.auth.getSession();
            if(!session) location.href = "index.html";
            loadSettings(); loadPosts(); loadCategories();
        }

        function showTab(t) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active', 'text-white'));
            event.currentTarget.classList.add('active', 'text-white');
        }

        async function loadPosts() {
            const { data } = await sc.from('posts').select('*').order('created_at', { ascending: false });
            document.getElementById('posts-table').innerHTML = data?.map(p => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-6 font-bold text-slate-800">${p.title}</td>
                    <td class="p-6"><span class="text-xs font-bold bg-teal-50 text-teal-600 px-3 py-1 rounded-full"><i class="fa-solid fa-heart"></i> ${p.likes_count} | <i class="fa-solid fa-comment"></i> ${p.comments_count}</span></td>
                    <td class="p-6 text-right space-x-2">
                        <button onclick="editPost('${p.id}')" class="text-emerald-500"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deletePost('${p.id}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // --- EXCELLENT AI GENERATOR ---
        async function generateExcellentPost() {
            const topic = document.getElementById('ai-topic').value;
            const apiKey = document.getElementById('gemini-key').value;
            if(!topic || !apiKey) return alert("Hata: Konu veya API Key eksik.");

            const btn = document.getElementById('ai-gen-btn');
            const loader = document.getElementById('ai-loading');
            btn.classList.add('hidden'); loader.classList.remove('hidden');

            const systemPrompt = `Sen Türkiye'nin en iyi ortaokul matematik öğretmenisin. 
            MÜKEMMEL, UZUN, RENKLİ ve YAPAY ZEKA OLDUĞU ANLAŞILMAYAN bir blog yazısı yazmalısın.
            
            YAZI YAPISI:
            1. Heyecan verici bir giriş.
            2. "Bunu Biliyor muydunuz?" gibi ilgi çekici bilgi kutuları.
            3. Konunun mantığını anlatan derinlikli paragraflar.
            4. Örnek soru ve çözümler.
            5. Öğrenciler için motivasyon cümlesi.
            
            KURALLAR:
            - Markdown sembollerini (**, ##) kullan, bunlar sistem tarafından şık başlıklar ve kalın metinlere dönüştürülecek.
            - Robotik listelerden kaçın, samimi bir öğretmen gibi konuş.
            - Yanıtı sadece şu JSON formatında ver: {"title": "...", "content": "..."}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Konu: ${topic}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const resJson = await response.json();
                const blog = JSON.parse(resJson.candidates[0].content.parts[0].text);
                document.getElementById('p-title').value = blog.title;
                document.getElementById('p-content').value = blog.content;
                closeAIModal();
            } catch (err) { alert("AI Hatası: " + err.message); }
            finally { btn.classList.remove('hidden'); loader.classList.add('hidden'); }
        }

        // --- FILE & CATEGORY MANAGEMENT ---
        async function loadCategories() {
            const { data } = await sc.from('file_categories').select('*');
            const parentSelect = document.getElementById('cat-parent');
            const catSelect = document.getElementById('file-cat-select');
            
            const html = data?.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            parentSelect.innerHTML = `<option value="">Ana Kategori</option>` + html;
            catSelect.innerHTML = `<option value="" disabled selected>Kategori Seçin</option>` + html;
        }

        document.getElementById('cat-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('cat-name').value;
            const parent_id = document.getElementById('cat-parent').value || null;
            await sc.from('file_categories').insert([{ name, parent_id }]);
            alert("Kategori eklendi!"); loadCategories(); e.target.reset();
        }

        document.getElementById('file-upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const file = document.getElementById('file-input').files[0];
            const catId = document.getElementById('file-cat-select').value;
            
            if(!file) return alert("Dosya seçin!");
            
            const filePath = `files/${Date.now()}_${file.name}`;
            const { data, error } = await sc.storage.from('files').upload(filePath, file);
            
            if(!error) {
                await sc.from('files').insert([{ 
                    name: file.name, 
                    storage_path: filePath, 
                    category_id: catId,
                    file_type: file.name.split('.').pop(),
                    size: (file.size / 1024 / 1024).toFixed(2) + " MB"
                }]);
                alert("Dosya başarıyla yüklendi!"); e.target.reset();
            } else alert("Upload Hatası: " + error.message);
        }

        // --- SETTINGS ---
        async function loadSettings() {
            const { data } = await sc.from('app_settings').select('*');
            data?.forEach(s => {
                if(s.key === 'gemini_api_key') document.getElementById('gemini-key').value = s.value;
                if(s.key === 'webhook_url') document.getElementById('webhook-url').value = s.value;
            });
        }

        async function saveAllSettings() {
            const key = document.getElementById('gemini-key').value;
            const hook = document.getElementById('webhook-url').value;
            await sc.from('app_settings').upsert([{ key: 'gemini_api_key', value: key }]);
            await sc.from('app_settings').upsert([{ key: 'webhook_url', value: hook }]);
            alert("Tüm ayarlar kaydedildi!");
        }

        // --- POST CRUD ---
        document.getElementById('post-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('p-title').value;
            const content = document.getElementById('p-content').value;
            
            if(id) await sc.from('posts').update({ title, content }).eq('id', id);
            else await sc.from('posts').insert([{ title, content, likes_count: 0, comments_count: 0 }]);
            
            alert("İşlem Başarılı!"); resetPostForm(); loadPosts();
        }

        function editPost(id) {
            sc.from('posts').select('*').eq('id', id).single().then(({data}) => {
                document.getElementById('edit-id').value = data.id;
                document.getElementById('p-title').value = data.title;
                document.getElementById('p-content').value = data.content;
                document.getElementById('post-form-title').innerText = "Yazıyı Güncelle";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
            });
        }

        async function deletePost(id) {
            if(confirm("Yazı silinecek?")) { await sc.from('posts').delete().eq('id', id); loadPosts(); }
        }

        function resetPostForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('post-form').reset();
            document.getElementById('post-form-title').innerText = "Yeni Yazı Yayınla";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        function openAIModal() { document.getElementById('ai-modal').classList.remove('hidden'); }
        function closeAIModal() { document.getElementById('ai-modal').classList.add('hidden'); }
        function logout() { sc.auth.signOut().then(() => location.href="index.html"); }

        init();
    </script>
</body>
</html>
