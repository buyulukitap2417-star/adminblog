<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MATOTA | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .loader { border-top-color: #10b981; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-overlay" class="fixed inset-0 z-[2000] bg-slate-900/50 backdrop-blur-md flex items-center justify-center p-6 hidden">
        <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-center text-slate-900">Admin Girişi</h2>
            <form id="admin-login-form" class="space-y-4">
                <input type="email" id="a-email" placeholder="E-posta" required class="w-full p-4 rounded-xl border outline-none">
                <input type="password" id="a-password" placeholder="Şifre" required class="w-full p-4 rounded-xl border outline-none">
                <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold">Giriş Yap</button>
            </form>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <nav class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-[100]">
            <h1 class="text-xl font-black text-emerald-600 uppercase">MATOTA Admin</h1>
            <div class="flex gap-4">
                <button onclick="showTab('publish')" class="tab-btn font-bold text-sm text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-100">Yayınla</button>
                <button onclick="showTab('manage')" class="tab-btn font-bold text-sm text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-100">İçerik Yönetimi</button>
                <button onclick="showTab('settings')" class="tab-btn font-bold text-sm text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-100">Ayarlar</button>
                <button onclick="logout()" class="text-red-500 text-sm font-bold ml-4">Çıkış</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-8">
            <!-- Yayınlama Sekmesi -->
            <div id="tab-publish" class="space-y-8">
                <div class="bg-white p-10 rounded-3xl shadow-sm border space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 id="form-title" class="text-2xl font-bold">Yeni Blog Yazısı</h2>
                        <button onclick="openAIModal()" class="bg-emerald-50 text-emerald-600 px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest border border-emerald-100"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI İle Hazırla</button>
                    </div>
                    <form id="post-form" class="space-y-4">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="p-title" placeholder="Yazı Başlığı" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                        <textarea id="p-content" rows="15" placeholder="İçerik..." required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                        <div class="flex gap-4">
                            <button type="submit" id="submit-btn" class="flex-grow bg-emerald-600 text-white p-4 rounded-2xl font-bold">Yayınla</button>
                            <button type="button" id="cancel-edit" class="hidden bg-slate-100 px-8 rounded-2xl font-bold" onclick="resetForm()">Vazgeç</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- İçerik Yönetimi Sekmesi -->
            <div id="tab-manage" class="hidden space-y-8">
                <div class="bg-white p-10 rounded-3xl shadow-sm border">
                    <h2 class="text-2xl font-bold mb-8">Yayınlanan İçerikler</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-400 text-sm uppercase tracking-widest">
                                    <th class="pb-4">Başlık</th>
                                    <th class="pb-4">Tarih</th>
                                    <th class="pb-4">İşlemler</th>
                                </tr>
                            </thead>
                            <tbody id="manage-list" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Ayarlar -->
            <div id="tab-settings" class="hidden max-w-md mx-auto bg-white p-10 rounded-3xl border space-y-6">
                <h2 class="text-2xl font-bold">Ayarlar</h2>
                <input type="password" id="gemini-key" placeholder="Gemini API Key" class="w-full p-4 border rounded-xl outline-none">
                <button onclick="saveApiKey()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold">Kaydet</button>
            </div>
        </main>
    </div>

    <!-- AI Modal -->
    <div id="ai-modal" class="fixed inset-0 z-[3000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 hidden">
        <div class="max-w-lg w-full bg-white p-10 rounded-3xl shadow-2xl space-y-6">
            <h2 class="text-3xl font-black">AI Yazar</h2>
            <input type="text" id="ai-topic" placeholder="Konu ne olsun?" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
            <div id="ai-status" class="hidden text-emerald-600 font-bold text-center py-4"><div class="loader mx-auto mb-2 border-4 rounded-full h-8 w-8"></div>Yazıyorum...</div>
            <div class="flex gap-4">
                <button onclick="closeAIModal()" class="flex-1 p-4 rounded-2xl bg-slate-100 font-bold">Vazgeç</button>
                <button id="ai-gen-btn" onclick="generateContent()" class="flex-1 p-4 rounded-2xl bg-emerald-600 text-white font-bold">Üret</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://eygvzptaynyysagvgwyh.supabase.co'; 
        const SB_KEY = 'sb_publishable_JixS3C4jQ2Znrgcr3-IZPg_1MfpvdXW';
        const sc = window.supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            const { data: { session } } = await sc.auth.getSession();
            if(session) {
                const { data: admin } = await sc.from('admins').select('uid').eq('uid', session.user.id).single();
                if(admin) { showAdmin(); loadSettings(); fetchManageList(); }
                else { await sc.auth.signOut(); showLogin(); }
            } else showLogin();
        }

        function showAdmin() { document.getElementById('login-overlay').classList.add('hidden'); document.getElementById('admin-content').classList.remove('hidden'); showTab('publish'); }
        function showLogin() { document.getElementById('login-overlay').classList.remove('hidden'); }
        function showTab(t) { ['publish','manage','settings'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); if(t === 'manage') fetchManageList(); }

        async function loadSettings() { const { data } = await sc.from('app_settings').select('value').eq('key', 'gemini_api_key').single(); if(data) document.getElementById('gemini-key').value = data.value; }
        async function saveApiKey() { const val = document.getElementById('gemini-key').value; await sc.from('app_settings').upsert({ key: 'gemini_api_key', value: val }); alert("Kaydedildi."); }

        async function fetchManageList() {
            const { data } = await sc.from('posts').select('*').order('created_at', { ascending: false });
            document.getElementById('manage-list').innerHTML = data.map(p => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="py-6 font-bold text-slate-700">${p.title}</td>
                    <td class="py-6 text-sm text-slate-400">${new Date(p.created_at).toLocaleDateString('tr-TR')}</td>
                    <td class="py-6 space-x-2">
                        <button onclick="editPost('${p.id}')" class="text-emerald-600 hover:bg-emerald-50 px-3 py-1 rounded-lg">Düzenle</button>
                        <button onclick="deletePost('${p.id}')" class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg">Sil</button>
                    </td>
                </tr>
            `).join('');
        }

        async function editPost(id) {
            const { data } = await sc.from('posts').select('*').eq('id', id).single();
            document.getElementById('edit-id').value = data.id;
            document.getElementById('p-title').value = data.title;
            document.getElementById('p-content').value = data.content;
            document.getElementById('form-title').innerText = "Yazıyı Güncelle";
            document.getElementById('submit-btn').innerText = "Güncelle";
            document.getElementById('cancel-edit').classList.remove('hidden');
            showTab('publish');
        }

        async function deletePost(id) {
            if(!confirm("Bu yazıyı silmek istediğine emin misin?")) return;
            await sc.from('posts').delete().eq('id', id);
            fetchManageList();
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('post-form').reset();
            document.getElementById('form-title').innerText = "Yeni Blog Yazısı";
            document.getElementById('submit-btn').innerText = "Yayınla";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        document.getElementById('post-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('p-title').value;
            const content = document.getElementById('p-content').value;

            if(id) {
                await sc.from('posts').update({ title, content }).eq('id', id);
                alert("Güncellendi!");
            } else {
                await sc.from('posts').insert([{ title, content }]);
                alert("Yayınlandı!");
                // Burada tüm abonelere mail gönderimi için bir tetikleyici (Edge Function) çağrılabilir.
            }
            resetForm();
            showTab('manage');
        }

        async function generateContent() {
            const topic = document.getElementById('ai-topic').value;
            const apiKey = document.getElementById('gemini-key').value;
            if(!topic || !apiKey) return alert("Konu ve Key eksik.");
            
            document.getElementById('ai-status').classList.remove('hidden');
            document.getElementById('ai-gen-btn').classList.add('hidden');

            const systemPrompt = "Sen samimi, hayat dolu bir ortaokul matematik öğretmenisin. Asla yapay zeka olduğunu belli etme. Markdown (#, **, ##) sembollerini KESİNLİKLE KULLANMA. Daha akıcı, gerçekçi ve samimi paragraflar kur. Çıktıyı JSON olarak ver: {'title': '...', 'content': '...'}";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Konu: ${topic}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                const blog = JSON.parse(data.candidates[0].content.parts[0].text);
                document.getElementById('p-title').value = blog.title;
                document.getElementById('p-content').value = blog.content;
                closeAIModal();
            } catch (err) { alert("Hata!"); }
            finally { document.getElementById('ai-status').classList.add('hidden'); document.getElementById('ai-gen-btn').classList.remove('hidden'); }
        }

        window.openAIModal = () => document.getElementById('ai-modal').classList.remove('hidden');
        window.closeAIModal = () => document.getElementById('ai-modal').classList.add('hidden');

        document.getElementById('admin-login-form').onsubmit = async (e) => {
            e.preventDefault();
            await sc.auth.signInWithPassword({ email: document.getElementById('a-email').value, password: document.getElementById('a-password').value });
            location.reload();
        }
        async function logout() { await sc.auth.signOut(); location.reload(); }
        init();
    </script>
</body>
</html>
