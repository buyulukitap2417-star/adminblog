<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MATOTA | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .loader { border-top-color: #10b981; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Giriş Katmanı -->
    <div id="login-overlay" class="fixed inset-0 z-[2000] bg-slate-900/50 backdrop-blur-md flex items-center justify-center p-6 hidden">
        <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-center text-slate-900">Admin Girişi</h2>
            <form id="admin-login-form" class="space-y-4">
                <input type="email" id="a-email" placeholder="E-posta" required class="w-full p-4 rounded-xl border outline-none focus:ring-2 focus:ring-emerald-500">
                <input type="password" id="a-password" placeholder="Şifre" required class="w-full p-4 rounded-xl border outline-none focus:ring-2 focus:ring-emerald-500">
                <button type="submit" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold">Giriş Yap</button>
            </form>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <nav class="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-[100]">
            <h1 class="text-xl font-black text-emerald-600 tracking-tighter uppercase">MATOTA Admin</h1>
            <div class="flex gap-4">
                <button onclick="showTab('publish')" class="tab-btn font-bold text-sm text-slate-600 border-b-2 border-transparent px-2">Yayınla</button>
                <button onclick="showTab('settings')" class="tab-btn font-bold text-sm text-slate-600 border-b-2 border-transparent px-2">Ayarlar</button>
                <button onclick="logout()" class="text-red-500 text-sm font-bold">Çıkış</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-8">
            
            <!-- Yayınlama Sekmesi -->
            <div id="tab-publish" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Blog Yazma -->
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-bold">Blog Yazısı</h2>
                            <button onclick="openAIModal()" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest border border-emerald-100 transition hover:bg-emerald-100">
                                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI ile Üret
                            </button>
                        </div>
                        <form id="post-form" class="space-y-4">
                            <input type="text" id="p-title" placeholder="Yazı Başlığı" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                            <textarea id="p-content" rows="12" placeholder="İçeriği buraya yazın..." required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
                            <button type="submit" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-bold hover:bg-emerald-700 transition">Yayınla</button>
                        </form>
                    </div>

                    <!-- Dosya Ekleme -->
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border space-y-6">
                        <h2 class="text-2xl font-bold">Kaynak Ekle</h2>
                        <form id="file-form" class="space-y-4">
                            <input type="text" id="f-name" placeholder="Dosya Adı" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                            <input type="url" id="f-url" placeholder="İndirme Linki" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                            <select id="f-type" class="w-full p-4 border rounded-2xl bg-white font-bold">
                                <option value="pdf">PDF</option>
                                <option value="doc">Word / Excel</option>
                                <option value="image">Görsel</option>
                            </select>
                            <button type="submit" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-black transition">Ekle</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Ayarlar Sekmesi -->
            <div id="tab-settings" class="hidden max-w-xl mx-auto bg-white p-10 rounded-[2.5rem] shadow-sm border space-y-8">
                <h2 class="text-3xl font-black text-slate-900">Sistem Ayarları</h2>
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-slate-500 uppercase tracking-widest">Gemini API Key</label>
                    <div class="flex gap-2">
                        <input type="password" id="gemini-key" placeholder="API Key girin..." class="flex-grow p-4 rounded-2xl border outline-none focus:ring-2 focus:ring-emerald-500">
                        <button onclick="saveApiKey()" class="bg-emerald-600 text-white px-6 rounded-2xl font-bold hover:bg-emerald-700 transition">Kaydet</button>
                    </div>
                    <p class="text-[10px] text-slate-400">Bu anahtar, AI ile içerik üretmek için Supabase üzerinde güvenli bir şekilde saklanır.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- AI Modal -->
    <div id="ai-modal" class="fixed inset-0 z-[3000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 hidden">
        <div class="max-w-lg w-full bg-white p-10 rounded-[3rem] shadow-2xl space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black">AI Yazar</h2>
                <button onclick="closeAIModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <p class="text-slate-500">Hangi matematiksel konuda bir blog yazısı üretmek istersin?</p>
            <input type="text" id="ai-topic" placeholder="Örn: 8. Sınıf Üslü Sayılar Pratik Bilgiler" class="w-full p-4 rounded-2xl border outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
            
            <div id="ai-status-container" class="hidden py-4 rounded-2xl text-center font-bold">
                <div id="ai-loading" class="flex items-center justify-center gap-3 text-emerald-600">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8"></div>
                    Yazı Hazırlanıyor...
                </div>
                <div id="ai-error" class="hidden text-red-500 bg-red-50 p-4 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-triangle-exclamation mr-2"></i>
                    <span id="ai-error-text">Bir hata oluştu.</span>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="closeAIModal()" class="flex-1 p-4 rounded-2xl font-bold bg-slate-100 hover:bg-slate-200 transition">Vazgeç</button>
                <button id="ai-gen-btn" onclick="generateContent()" class="flex-1 p-4 rounded-2xl font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition shadow-lg shadow-emerald-100">Üret</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://eygvzptaynyysagvgwyh.supabase.co'; 
        const SB_KEY = 'sb_publishable_JixS3C4jQ2Znrgcr3-IZPg_1MfpvdXW';
        const sc = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null;

        async function init() {
            const { data: { session } } = await sc.auth.getSession();
            if(session) {
                const { data: admin } = await sc.from('admins').select('uid').eq('uid', session.user.id).single();
                if(admin) {
                    user = session.user;
                    showAdmin();
                    loadSettings();
                } else {
                    await sc.auth.signOut();
                    document.getElementById('login-overlay').classList.remove('hidden');
                }
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        }

        async function loadSettings() {
            const { data } = await sc.from('app_settings').select('value').eq('key', 'gemini_api_key').single();
            if(data) document.getElementById('gemini-key').value = data.value;
        }

        async function saveApiKey() {
            const val = document.getElementById('gemini-key').value.trim();
            if(!val) return alert("Lütfen bir anahtar girin.");
            const { error } = await sc.from('app_settings').upsert({ key: 'gemini_api_key', value: val, updated_at: new Date() });
            if(!error) alert("API Key başarıyla kaydedildi!");
            else alert("Kaydedilemedi: " + error.message);
        }

        function showAdmin() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            showTab('publish');
        }

        function showTab(t) {
            ['publish','settings'].forEach(id => {
                document.getElementById('tab-'+id).classList.add('hidden');
            });
            document.getElementById('tab-'+t).classList.remove('hidden');
        }

        async function generateContent() {
            const topic = document.getElementById('ai-topic').value.trim();
            if(!topic) return alert("Lütfen bir konu girin.");

            // Ayarlardan API anahtarını çek
            const { data: keyData } = await sc.from('app_settings').select('value').eq('key', 'gemini_api_key').single();
            const apiKey = keyData?.value;

            if(!apiKey) {
                alert("Lütfen önce Ayarlar sekmesinden Gemini API Key kaydedin!");
                showTab('settings');
                closeAIModal();
                return;
            }

            const btn = document.getElementById('ai-gen-btn');
            const statusContainer = document.getElementById('ai-status-container');
            const loading = document.getElementById('ai-loading');
            const errorDiv = document.getElementById('ai-error');
            const errorText = document.getElementById('ai-error-text');

            btn.disabled = true;
            statusContainer.classList.remove('hidden');
            loading.classList.remove('hidden');
            errorDiv.classList.add('hidden');

            const systemPrompt = "Sen profesyonel bir ortaokul matematik öğretmenisin. Verilen konuda, öğrencilerin hem eğlenip hem öğreneceği, akıcı, modern ve emoji destekli bir blog yazısı üret. Çıktıyı mutlaka şu JSON formatında ver: {\"title\": \"...\", \"content\": \"...\"}";
            const userQuery = `Şu konuda bir blog yazısı yaz: ${topic}`;

            let resultText = "";
            let attempts = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];

            try {
                while (attempts < 5) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if (response.status === 401 || response.status === 403) {
                            throw new Error("API Anahtarı geçersiz veya yetkisiz (401/403). Lütfen anahtarı kontrol edin.");
                        }

                        if (response.status === 404) {
                            throw new Error("Model bulunamadı (404). Lütfen model ismini kontrol edin.");
                        }

                        if (!response.ok) {
                            const errorData = await response.json().catch(() => ({}));
                            throw new Error(errorData.error?.message || `Sunucu hatası: ${response.status}`);
                        }

                        const data = await response.json();
                        resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (resultText) break;
                        else throw new Error("AI geçerli bir yanıt oluşturamadı.");

                    } catch (e) {
                        attempts++;
                        // Kritik hatalarda (Auth/404) tekrar denemeyi kes
                        if (e.message.includes("401") || e.message.includes("403") || e.message.includes("404") || attempts >= 5) {
                            throw e;
                        }
                        await new Promise(r => setTimeout(r, delays[attempts-1]));
                    }
                }

                const blog = JSON.parse(resultText);
                document.getElementById('p-title').value = blog.title;
                document.getElementById('p-content').value = blog.content;
                
                statusContainer.classList.add('hidden');
                closeAIModal();
                alert("Yazı başarıyla oluşturuldu!");

            } catch (err) {
                loading.classList.add('hidden');
                errorDiv.classList.remove('hidden');
                errorText.innerText = err.message;
                console.error("AI Error:", err);
            } finally {
                btn.disabled = false;
            }
        }

        window.openAIModal = () => {
            document.getElementById('ai-topic').value = "";
            document.getElementById('ai-status-container').classList.add('hidden');
            document.getElementById('ai-modal').classList.remove('hidden');
        };
        window.closeAIModal = () => document.getElementById('ai-modal').classList.add('hidden');

        // Formlar
        document.getElementById('post-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await sc.from('posts').insert([{ 
                title: document.getElementById('p-title').value, 
                content: document.getElementById('p-content').value 
            }]);
            if(error) alert("Hata: " + error.message); 
            else { alert("Blog yazısı başarıyla yayınlandı!"); e.target.reset(); }
        }

        document.getElementById('file-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await sc.from('files').insert([{ 
                name: document.getElementById('f-name').value, 
                url: document.getElementById('f-url').value, 
                file_type: document.getElementById('f-type').value 
            }]);
            if(error) alert("Hata: " + error.message); 
            else { alert("Dosya başarıyla eklendi!"); e.target.reset(); }
        }

        document.getElementById('admin-login-form').onsubmit = async (e) => {
            e.preventDefault();
            const { error } = await sc.auth.signInWithPassword({ 
                email: document.getElementById('a-email').value, 
                password: document.getElementById('a-password').value 
            });
            if(error) alert("Giriş hatası: " + error.message); 
            else location.reload();
        }

        async function logout() { await sc.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
